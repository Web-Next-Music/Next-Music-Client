<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Next Music: Settings</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Science+Gothic:wght@100..900&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="titlebar">
            <span class="tb-title" data-i18n="settings.title">Settings</span>
            <button
                class="tb-btn tb-minimize"
                onclick="window.electronAPI?.minimizeWindow()"
            >
                <svg
                    width="10"
                    height="1"
                    viewBox="0 0 10 1"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <path
                        d="M0 0.5H10"
                        stroke="currentColor"
                        stroke-width="1"
                    />
                </svg>
            </button>
            <button
                class="tb-btn tb-maximize"
                id="tb-maximize"
                onclick="toggleMaximize()"
            >
                <svg
                    width="10"
                    height="10"
                    viewBox="0 0 10 10"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <rect
                        x="0.5"
                        y="0.5"
                        width="9"
                        height="9"
                        rx="0.5"
                        stroke="currentColor"
                        stroke-width="1"
                    />
                </svg>
            </button>
            <button
                class="tb-btn tb-close"
                onclick="window.electronAPI?.closeWindow()"
            >
                <svg
                    width="10"
                    height="10"
                    viewBox="0 0 10 10"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <path
                        d="M0.5 0.5L9.5 9.5M9.5 0.5L0.5 9.5"
                        stroke="currentColor"
                        stroke-width="1"
                        stroke-linecap="round"
                    />
                </svg>
            </button>
        </div>

        <div class="layout">
            <nav class="sidebar" id="sidebar">
                <div class="sidebar-nav" id="sidebar-nav"></div>
                <div class="sidebar-footer" id="sidebar-footer">
                    <div class="ver-row">
                        <span class="ver-name">Next Music</span>
                        <span class="ver-val" id="ver-app">—</span>
                    </div>
                    <div class="ver-row">
                        <span class="ver-name">Electron</span>
                        <span class="ver-val" id="ver-electron">—</span>
                    </div>
                    <div class="ver-row">
                        <span class="ver-name">Chromium</span>
                        <span class="ver-val" id="ver-chromium">—</span>
                    </div>
                    <div class="ver-row">
                        <span class="ver-name">Node.js</span>
                        <span class="ver-val" id="ver-node">—</span>
                    </div>
                </div>
            </nav>
            <main class="content" id="content"></main>
        </div>

        <script src="script.js"></script>
    </body>
</html>
