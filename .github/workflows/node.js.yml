name: Build Release

on:
    release:
        types: [published]

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: windows-latest
                      cmd: build:win
                    - os: ubuntu-latest
                      cmd: build:linux

        runs-on: ${{ matrix.os }}

        permissions:
            contents: write

        env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js 24
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install Linux build dependencies
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      libarchive-tools \
                      xz-utils \
                      fakeroot \
                      ruby \
                      rpm

            - name: Install dependencies
              run: npm install

            - name: Build (${{ matrix.cmd }})
              run: npm run ${{ matrix.cmd }} -- --publish never

            - name: Upload Windows/Linux artifacts to release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      release/*.exe
                      release/*.AppImage
                      release/*.deb
                      release/*.pkg.tar.zst
