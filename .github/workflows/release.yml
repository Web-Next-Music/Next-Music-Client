name: Release

on:
  release:
    types: [published]

jobs:
  generate-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --tag-pattern "v?[0-9]+\.[0-9]+.*" --strip all

      - name: Set release notes
        if: steps.cliff.outputs.content != ''
        uses: actions/github-script@v7
        env:
          CLIFF_OUTPUT: ${{ steps.cliff.outputs.content }}
        with:
          script: |
            const release = context.payload.release;

            if (release.body && release.body.trim().length > 0) {
              console.log('Release already has a body, skipping.');
              return;
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: process.env.CLIFF_OUTPUT,
            });

  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            cmd: build:win
          - os: ubuntu-latest
            cmd: build:linux

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              libarchive-tools \
              xz-utils \
              fakeroot \
              ruby \
              rpm

      - name: Install dependencies
        run: npm install

      - name: Build (${{ matrix.cmd }})
        run: npm run ${{ matrix.cmd }} -- --publish never

      - name: Upload Windows/Linux artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.pkg.tar.zst
