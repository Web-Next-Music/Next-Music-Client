name: Release

on:
  release:
    types: [published]

jobs:
  generate-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --tag-pattern "v?[0-9]+\.[0-9]+.*" --strip all

      - name: Set release notes
        if: steps.cliff.outputs.content != ''
        uses: actions/github-script@v7
        env:
          CLIFF_OUTPUT: ${{ steps.cliff.outputs.content }}
        with:
          script: |
            const release = context.payload.release;

            if (release.body && release.body.trim().length > 0) {
              console.log('Release already has a body, skipping.');
              return;
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: process.env.CLIFF_OUTPUT,
            });

  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            cmd: build:win
          - os: ubuntu-latest
            cmd: build:linux

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              libarchive-tools \
              xz-utils \
              fakeroot \
              ruby \
              rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (${{ matrix.cmd }})
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: pnpm run ${{ matrix.cmd }} -- --publish never

      - name: Upload Windows/Linux artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.pkg.tar.zst

      - name: Setup SSH for AUR
        if: matrix.os == 'ubuntu-latest'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Push pacman package to AUR
        if: matrix.os == 'ubuntu-latest'
        env:
          AUR_REPO: next-music
        run: |
          set -euxo pipefail

          mkdir -p ~/.ssh
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts

          RELEASE_TAG="${{ github.event.release.tag_name }}"
          PKGVER="${RELEASE_TAG#v}"
          echo "Release tag: $RELEASE_TAG"
          echo "Package version: $PKGVER"

          # find pacman package built by electron-builder
          PKG_FILE=$(ls release/*.pkg.tar.zst | head -n1)
          echo "Found package: $PKG_FILE"
          PKGFILE=$(basename "$PKG_FILE")

          # compute checksum of the built package
          SHA256=$(sha256sum "$PKG_FILE" | awk '{print $1}')
          echo "SHA256: $SHA256"

          # clone AUR repo via SSH and prepare commit
          git clone "ssh://aur@aur.archlinux.org/${{ env.AUR_REPO }}.git" aur
          cd aur

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # update PKGBUILD for the current release
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s|^_pkgfile=.*|_pkgfile=\"${PKGFILE}\"|" PKGBUILD
          sed -i "s|^_pkgtag=.*|_pkgtag=\"${RELEASE_TAG}\"|" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD

          # update .SRCINFO to match PKGBUILD
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/${PKGFILE}"
          sed -i "s/^\tpkgver = .*/\tpkgver = ${PKGVER}/" .SRCINFO
          sed -i "s/^\tpkgrel = .*/\tpkgrel = 1/" .SRCINFO
          sed -i "s/^\tnoextract = .*/\tnoextract = ${PKGFILE}/" .SRCINFO
          sed -i "s|^\tsource = .*|\tsource = ${PKGFILE}::${SOURCE_URL}|" .SRCINFO
          sed -i "s/^\tsha256sums = .*/\tsha256sums = ${SHA256}/" .SRCINFO

          git add PKGBUILD .SRCINFO
          git commit -m "ci: Update to ${PKGVER}" || echo "No changes to commit"
          git push origin master
